# Render Blueprint — provisions the Go web service + a managed Postgres.
# Deploy via the Render MCP or the dashboard ("New +" → "Blueprint").

databases:
  - name: mf-monitoring-db
    databaseName: mf_monitoring
    user: mf
    plan: free

services:
  - type: web
    name: mf-backend
    runtime: go
    plan: free
    # Monorepo: this service lives in the mf-backend/ subdirectory.
    rootDir: mf-backend
    buildCommand: go build -o app ./cmd/server
    startCommand: ./app
    healthCheckPath: /health
    # Both sides now speak the new /llm/runs contract, so the ordering that
    # forced a manual release is no longer a constraint.
    #
    # Note for the next breaking change: the frontend deploys from this same
    # push via Vercel, and the two build at different speeds, so a contract
    # change leaves a window where they disagree. Work out which side must land
    # first from the fields each reads on the other's response — not from which
    # service owns the change — then set this to false while you release them in
    # that order.
    autoDeploy: true
    envVars:
      # Wired automatically from the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: mf-monitoring-db
          property: connectionString
      # A strong secret generated by Render (never commit real secrets).
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      # Render terminates TLS and fronts this service with its own proxy, so
      # X-Forwarded-For is set by infrastructure we control and RealIP may
      # trust it. Without this the limiter sees only the proxy's address and
      # buckets every user together — one abuser would then lock everyone out.
      - key: TRUST_PROXY
        value: "true"
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 168h
      # Vercel frontend origin (no trailing slash).
      - key: CORS_ORIGINS
        value: https://mf-academy-raw-llm-monitoring-ten.vercel.app

      # ---- Server-side inference (mf-inference/) ----
      #
      # Points at the self-hosted MLC host, reached through a Cloudflare tunnel.
      # No trailing /v1: the provider appends the path itself.
      #
      # Leaving this unset is a supported state — POST /llm/generate then answers
      # 503 and the browser path is unaffected — so the API survives the
      # inference machine being switched off.
      - key: LLM_BASE_URL
        value: https://mlc.visevent.com
      # The shared secret the tunnel's gateway checks. sync: false means the
      # blueprint declares the variable but never carries its value: the real
      # one is set in the dashboard and stays out of this repository.
      - key: LLM_API_KEY
        sync: false
      # Generous next to the 5s global REQUEST_TIMEOUT, and applied only to the
      # generation route. Measured on the inference host: ~107 tok/s warm, so a
      # 512-token answer lands in about 5s; the rest is headroom for the tunnel
      # hop and a busy card. Must stay under the server's 30s WriteTimeout.
      - key: LLM_TIMEOUT
        value: 25s
