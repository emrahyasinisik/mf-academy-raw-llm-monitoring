# Render Blueprint — provisions the Go web service + a managed Postgres.
# Deploy via the Render MCP or the dashboard ("New +" → "Blueprint").

databases:
  - name: mf-monitoring-db
    databaseName: mf_monitoring
    user: mf
    plan: free

services:
  - type: web
    name: mf-backend
    runtime: go
    plan: free
    # Monorepo: this service lives in the mf-backend/ subdirectory.
    rootDir: mf-backend
    buildCommand: go build -o app ./cmd/server
    startCommand: ./app
    healthCheckPath: /health
    # Held off for the /llm/runs contract change. The old frontend crashes on a
    # RunSummary response (it reads expected_keywords, which summaries omit), so
    # the frontend has to land first; the reverse order white-screens the
    # dashboard. Vercel deploys the frontend on push, then the backend is
    # released by hand. Set back to true once both sides are on the new contract.
    autoDeploy: false
    envVars:
      # Wired automatically from the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: mf-monitoring-db
          property: connectionString
      # A strong secret generated by Render (never commit real secrets).
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      # Render terminates TLS and fronts this service with its own proxy, so
      # X-Forwarded-For is set by infrastructure we control and RealIP may
      # trust it. Without this the limiter sees only the proxy's address and
      # buckets every user together — one abuser would then lock everyone out.
      - key: TRUST_PROXY
        value: "true"
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 168h
      # Vercel frontend origin (no trailing slash).
      - key: CORS_ORIGINS
        value: https://mf-academy-raw-llm-monitoring-ten.vercel.app
